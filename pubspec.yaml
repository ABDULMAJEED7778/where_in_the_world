name: where_in_the_world
description: "A geography quiz party game where players guess countries from landmark images."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.2
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.10+1
  rainbow_edge_lighting: ^1.1.0
  lottie: ^3.3.2
  google_generative_ai: ^0.4.3
  flutter_dotenv: ^5.1.0
  audioplayers: ^5.2.1
  # Firebase for online multiplayer
  firebase_core: ^3.8.1
  firebase_database: ^11.2.1
  # Sharing and deep links
  share_plus: ^10.1.4
  app_links: ^6.4.0
  uuid: ^4.5.1
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/landmarks/
    - assets/lotties/
    - assets/.env
    - .env
    - assets/sounds/music/
    - assets/sounds/effects/game_flow/
    - assets/sounds/effects/gameplay/
    - assets/sounds/effects/questions/
    - assets/sounds/effects/ui/
    - lib/data/photos_data.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_2.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2C1B4D"
  image: assets/images/logo_2.png
  android: true
  ios: true
  android_12:
    image: assets/images/logo_2.png
    color: "#2C1B4D"
